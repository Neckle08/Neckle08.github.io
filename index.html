<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메인 페이지</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      font-family: 'Arial', sans-serif;
      height: 100%;
      background-color: #f4f4f4;
      overflow: hidden;
    }

    body {
      background: url('BG1.jpg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: -1;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    nav .logo img {
      height: 50px;
    }

    nav ul {
      list-style: none;
      display: flex;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 10px 20px;
      transition: background-color 0.3s ease;
    }

    nav ul li a:hover {
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 5px;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
    }

    .content p {
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff;
    }

    @media (max-width: 768px) {
      nav ul {
        flex-direction: column;
      }

      .content p {
        font-size: 1.2rem;
      }
    }

  </style>
</head>
<body>

  <nav>
    <div class="logo">
      <a href="index.html">
        <img src="AElogo.png" alt="AE 로고">
      </a>
    </div>
    <ul>
      <li><a href="install.html">설치 하는법</a></li>
      <li><a href="interface.html">화면 설명</a></li>
      <li><a href="motiongraph.html">모션그래프</a></li>
      <li><a href="effect.html">효과 설명</a></li>
      <li><a href="render.html">랜더링</a></li>
    </ul>
  </nav>

  <div class="content">
    <p>생동감 있는 그래픽 및 시각 효과 제작을 위한 최고의 프로그램</p>
  </div>

</body>
</html>
